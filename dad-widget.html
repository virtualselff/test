<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dad Gallery Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+10&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    body {
      text-align: center;
      font-family: "Jersey 10", sans-serif;
    }
  </style>

</head>
<body>
  <h1 class = "rainbowheader">LATEST ART!</h1>
  <div id="widget-container" class="error-msg">Loading latest artwork...</div>

  <script>
    (async function() {
      const container = document.getElementById('widget-container');
      const targetUrl = 'https://dad.gallery/users/38740/submissions';
      const proxyUrl = 'https://api.allorigins.win/raw?url=';

      try {
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
        if (!response.ok) throw new Error('Failed to fetch');
        const html = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const element = doc.querySelector('.submissionIcon');

        if (!element) {
          container.innerHTML = 'No submissions found.';
          return;
        }

        element.querySelectorAll('a').forEach(link => {
          let href = link.getAttribute('href');
          if (href && !href.startsWith('http://') && !href.startsWith('https://')) {
            href = href.startsWith('/') ? 'https://dad.gallery' + href : 'https://dad.gallery/' + href;
            link.setAttribute('href', href);
          }
          link.setAttribute('target', '_blank');
          link.setAttribute('title', 'View my latest art on dad.gallery');
        });

        container.innerHTML = element.outerHTML;
        container.className = '';

      } catch (error) {
        console.error('Widget error:', error);
        container.innerHTML = `
          <div class="error-msg">
            Could not load artwork.<br>
            <a href="${targetUrl}" target="_blank" style="color: #007bff;">View on dad.gallery →</a>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
