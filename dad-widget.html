<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dad Gallery Widget</title>
  <style>
    /* Clean, minimal styling for the widget */
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: sans-serif;
    }
    .submissionIcon {
      max-width: 100%;
    }
    .submissionIcon img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }
    .submissionIcon a {
      text-decoration: none;
    }
    .error-msg {
      padding: 10px;
      color: #666;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="widget-container" class="error-msg">Loading latest artwork...</div>

  <script>
    (async function() {
      const container = document.getElementById('widget-container');
      
      // Your dad.gallery user URL
      const targetUrl = 'https://dad.gallery/users/10058/submissions';
      // Using a CORS proxy (this works inside the iframe because it's not on Neocities)
      const proxyUrl = 'https://api.allorigins.win/raw?url=';

      try {
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
        if (!response.ok) throw new Error('Failed to fetch');
        const html = await response.text();

        // Parse the HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const element = doc.querySelector('.submissionIcon');

        if (!element) {
          container.innerHTML = 'No submissions found.';
          return;
        }

        // Fix all links to be absolute and open in new tabs
        element.querySelectorAll('a').forEach(link => {
          let href = link.getAttribute('href');
          if (href && !href.startsWith('http://') && !href.startsWith('https://')) {
            href = href.startsWith('/') ? 'https://dad.gallery' + href : 'https://dad.gallery/' + href;
            link.setAttribute('href', href);
          }
          link.setAttribute('target', '_blank');
          link.setAttribute('title', 'View my latest art on dad.gallery');
        });

        // Insert the fetched content
        container.innerHTML = element.outerHTML;
        container.className = ''; // Remove error styling

      } catch (error) {
        console.error('Widget error:', error);
        container.innerHTML = `
          <div class="error-msg">
            Could not load artwork.<br>
            <a href="${targetUrl}" target="_blank" style="color: #007bff;">View on dad.gallery →</a>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
